    <style>
        .changelog-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .version-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0,0,0,0.07);
            margin-bottom: 24px;
            overflow: hidden;
            border-left: 4px solid #007AFF;
        }
        
        .version-header {
            background: linear-gradient(135deg, #007AFF, #0051D5);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .version-number {
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .version-date {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        
        .version-content {
            padding: 20px;
        }
        
        .changelog-section {
            margin-bottom: 16px;
        }
        
        .changelog-section h4 {
            color: #007AFF;
            margin-bottom: 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
        }
        
        .changelog-section h4::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #007AFF;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        .changelog-list {
            margin: 0;
            padding-left: 20px;
        }
        
        .changelog-list li {
            margin-bottom: 6px;
            color: #444;
            line-height: 1.5;
        }
        
        .feature-new { color: #34C759; font-weight: 500; }
        .feature-improved { color: #007AFF; font-weight: 500; }
        .feature-fixed { color: #FF3B30; font-weight: 500; }
        
        .platform-badge {
            display: inline-block;
            background: #007AFF;
            color: white;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 8px;
        }
        
        .back-button {
            display: inline-block;
            background: #007AFF;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        
        .back-button:hover {
            background: #0051D5;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .status-beta { background: #FF9500; color: white; }
        .status-stable { background: #34C759; color: white; }
        .status-alpha { background: #FF3B30; color: white; }
        .status-discontinued { background: #8E8E93; color: white; }
        
        .discontinued-notice {
            background: linear-gradient(135deg, #FF3B30, #D70015);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
        }
        .discontinued-notice h3 {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
        }
        
        .discontinued-notice p {
            margin: 0;
            opacity: 0.9;
        }
    </style>
</head>
